spring:
  application:
    name: cms-back

  # ==================== PostgreSQL ====================
  datasource:
    url: jdbc:postgresql://localhost:5432/cms_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ==================== MongoDB ====================
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/cms_content}

  # ==================== Flyway ====================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ==================== Server ====================
server:
  port: 8080
  servlet:
    context-path: /api

# ==================== JWT ====================
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-at-least-32-chars}
  expiration: 86400000        # 1 dia en ms
  refresh-expiration: 604800000  # 7 dias en ms

# ==================== Swagger / OpenAPI ====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ==================== Logging ====================
logging:
  level:
    com.cms: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
